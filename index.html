<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina Champ's Pro - V3</title>
    <style>
        :root { --primary: #1e3d59; --secondary: #17b978; --accent: #ff6b6b; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 850px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: #eee; padding: 5px; border-radius: 10px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .foto-galeria { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; margin: 10px 0; }
        .foto-thumb { width: 100%; height: 70px; object-fit: cover; border-radius: 5px; border: 1px solid var(--primary); }

        .pecas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin: 15px 0; }
        .peca-card { background: #f9f9f9; border: 1px solid #eee; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        
        .btn-main { width: 100%; padding: 15px; background: var(--secondary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }
        .btn-ia { background: var(--primary); margin-bottom: 10px; }

        .preview-box { background: #eef9f5; border: 2px dashed var(--secondary); padding: 20px; border-radius: 10px; margin-top: 20px; display: none; }
        .hist-item { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-bottom: 12px; border-left: 6px solid var(--primary); }
        .filtros { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; padding: 10px; background: #f0f0f0; border-radius: 8px; }
        .hidden { display: none; }

        /* Backoffice List */
        .back-item { display: flex; gap: 10px; padding: 8px; border-bottom: 1px solid #eee; align-items: center; }
        .back-item input { margin: 0; padding: 5px; border: 1px solid transparent; background: transparent; }
        .back-item input:focus { border-color: #ccc; background: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('orcamento')">📝 Orçamento</button>
        <button class="tab-btn" onclick="showTab('backoffice')">⚙️ Peças</button>
        <button class="tab-btn" onclick="showTab('historico')">🗂️ Histórico</button>
    </div>

    <div id="tab-orcamento">
        <select id="tipo-v">
            <option value="Carro">🚗 Carro</option>
            <option value="Mota">🏍️ Mota</option>
            <option value="Barco">🛥️ Barco</option>
            <option value="Outro">🚐 Outro</option>
        </select>
        
        <label>Fotos (Até 10):</label>
        <input type="file" id="fotos" accept="image/*" multiple onchange="loteFotos()">
        <div id="pre-fotos" class="foto-galeria"></div>
        
        <button class="btn-main btn-ia" onclick="rodarIA()">🤖 Analisar Danos</button>
        <div id="status-ia" style="text-align:center; font-size:12px; margin-bottom:10px;"></div>

        <input type="text" id="cli" placeholder="Nome do Cliente">
        <input type="text" id="mod" placeholder="Marca / Modelo da Viatura">
        
        <select id="tinta">
            <option value="0">Pintura Sólida (+0€)</option>
            <option value="60">Pintura Metalizada (+60€)</option>
            <option value="120">Pintura Pérola (+120€)</option>
        </select>

        <div id="lista-pecas" class="pecas-grid"></div>

        <button class="btn-main" onclick="gerarResumo()">Calcular Orçamento</button>

        <div id="resumo-box" class="preview-box">
            <div id="dados-resumo"></div>
            <button class="btn-main" onclick="salvarEEnviar()">✅ Confirmar, Guardar e Enviar</button>
        </div>
    </div>

    <div id="tab-backoffice" class="hidden">
        <h3>Adicionar Nova Peça</h3>
        <div style="display:flex; gap:10px;">
            <input type="text" id="n-p" placeholder="Peça">
            <input type="number" id="v-p" placeholder="€">
            <button class="btn-main" style="width:80px; margin:0;" onclick="addP()">Add</button>
        </div>
        <h3>Lista de Peças (Edite nos campos)</h3>
        <div id="lista-back"></div>
    </div>

    <div id="tab-historico" class="hidden">
        <div class="filtros">
            <input type="text" id="f-busca" placeholder="🔍 Marca..." oninput="renderH()">
            <select id="f-tipo" onchange="renderH()">
                <option value="">Todos</option>
                <option value="Carro">Carros</option>
                <option value="Mota">Motas</option>
            </select>
            <input type="date" id="f-data" onchange="renderH()">
        </div>
        <div id="lista-h"></div>
    </div>
</div>

<script>
    const KEY = "AIzaSyCkYLiyYnTa3-lVpCUGX194gjXXC9JizZ0";
    let pecas = JSON.parse(localStorage.getItem('of_pecas')) || [{nome:"Capô", preco:150}, {nome:"Porta", preco:100}, {nome:"Pintura Geral", preco:1200}];
    let hist = JSON.parse(localStorage.getItem('of_hist')) || [];
    let fotosB64 = [];
    let buffer = {};

    function showTab(t) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`[onclick="showTab('${t}')"]`).classList.add('active');
        ['orcamento', 'backoffice', 'historico'].forEach(id => document.getElementById('tab-'+id).classList.toggle('hidden', id !== t));
        if(t === 'backoffice') renderB();
        if(t === 'historico') renderH();
        renderO();
    }

    function loteFotos() {
        const files = document.getElementById('fotos').files;
        const div = document.getElementById('pre-fotos');
        div.innerHTML = ""; fotosB64 = [];
        Array.from(files).slice(0, 10).forEach(f => {
            const r = new FileReader();
            r.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 150; canvas.height = (img.height * 150) / img.width;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 150, canvas.height);
                    const b64 = canvas.toDataURL('image/jpeg', 0.2); // Compressão forte para histórico
                    fotosB64.push(b64);
                    div.innerHTML += `<img src="${b64}" class="foto-thumb">`;
                };
                img.src = e.target.result;
            };
            r.readAsDataURL(f);
        });
    }

    async function rodarIA() {
        if(!fotosB64.length) return alert("Suba uma foto!");
        document.getElementById('status-ia').innerText = "Analisando danos...";
        try {
            const prompt = "Lista as peças riscadas ou amassadas desta lista: " + pecas.map(p=>p.nome).join(",");
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ contents: [{ parts: [{text: prompt}, {inline_data: {mime_type: "image/jpeg", data: fotosB64[0].split(',')[1]}}]}]})
            });
            const d = await res.json();
            const txt = d.candidates[0].content.parts[0].text.toLowerCase();
            document.querySelectorAll('.p-check').forEach(c => { if(txt.includes(c.value.toLowerCase())) c.checked = true; });
            document.getElementById('status-ia').innerText = "✅ IA Finalizada";
        } catch (e) { document.getElementById('status-ia').innerText = "❌ Erro IA"; }
    }

    function renderO() {
        document.getElementById('lista-pecas').innerHTML = pecas.map(p => `
            <div class="peca-card"><input type="checkbox" class="p-check" value="${p.nome}" data-p="${p.preco}"> ${p.nome} (${p.preco}€)</div>
        `).join('');
    }

    function gerarResumo() {
        const c = document.getElementById('cli').value || "Cliente";
        const m = document.getElementById('mod').value || "Viatura";
        const v = document.getElementById('tipo-v').value;
        let total = parseFloat(document.getElementById('tinta').value);
        let sel = [];
        document.querySelectorAll('.p-check:checked').forEach(i => { total += parseFloat(i.dataset.p); sel.push(i.value); });
        
        const servico = sel.includes("Pintura Geral") ? "Pintura Geral" : "Reparação de Peças";
        
        buffer = { cliente: c, viatura: m, tipo: v, total: total, pecas: sel, servico: servico, data: new Date().toISOString().split('T')[0] };

        document.getElementById('dados-resumo').innerHTML = `
            <strong>${c} - ${m} (${v})</strong><br>
            <p>Serviço: ${servico}</p>
            <p>Peças: ${sel.join(', ')}</p>
            <h2 style="margin:5px 0;">Total: ${total.toFixed(2)}€</h2>
        `;
        document.getElementById('resumo-box').style.display = 'block';
    }

    function salvarEEnviar() {
        // 1. Guardar no Histórico
        const item = { ...buffer, fotos: [...fotosB64], id: Date.now() };
        hist.unshift(item);
        try {
            localStorage.setItem('of_hist', JSON.stringify(hist));
        } catch(e) {
            alert("Espaço cheio! Apague fotos antigas do histórico.");
        }

        // 2. Enviar WhatsApp
        const msg = `*Orçamento Oficina Champ's*\n\nCliente: ${buffer.cliente}\nViatura: ${buffer.viatura}\nServiço: ${buffer.servico}\nPeças: ${buffer.pecas.join(', ')}\n*Total: ${buffer.total.toFixed(2)}€*`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');

        alert("Sucesso!");
        showTab('historico');
        document.getElementById('resumo-box').style.display = 'none';
    }

    function renderH() {
        const busca = document.getElementById('f-busca').value.toLowerCase();
        const tipo = document.getElementById('f-tipo').value;
        const data = document.getElementById('f-data').value;

        const f = hist.filter(h => {
            return h.viatura.toLowerCase().includes(busca) && 
                   (tipo === "" || h.tipo === tipo) &&
                   (data === "" || h.data === data);
        });

        document.getElementById('lista-h').innerHTML = f.map(h => `
            <div class="hist-item">
                <div style="display:flex; justify-content:space-between"><strong>${h.data} | ${h.viatura}</strong> <span>${h.total}€</span></div>
                <div style="font-size:12px; color:#666">Serviço: ${h.servico} | Peças: ${h.pecas.join(', ')}</div>
                <div class="foto-galeria">${(h.fotos || []).map(img => `<img src="${img}" class="foto-thumb">`).join('')}</div>
            </div>
        `).join('') || "Sem registos.";
    }

    function renderB() {
        document.getElementById('lista-back').innerHTML = pecas.map((p, i) => `
            <div class="back-item">
                <input type="text" value="${p.nome}" style="flex:2" onchange="pecas[${i}].nome=this.value; salB()">
                <input type="number" value="${p.preco}" style="flex:1" onchange="pecas[${i}].preco=this.value; salB()">
                <button onclick="pecas.splice(${i},1); salB(); renderB()" style="color:red; border:none; background:none; cursor:pointer;">✖</button>
            </div>
        `).join('');
    }

    function addP() {
        const n = document.getElementById('n-p').value;
        const v = document.getElementById('v-p').value;
        if(n && v) { pecas.push({nome:n, preco:parseFloat(v)}); salB(); renderB(); }
    }

    function salB() { localStorage.setItem('of_pecas', JSON.stringify(pecas)); }

    showTab('orcamento');
</script>
</body>
</html>
